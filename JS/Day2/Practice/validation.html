<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation</title>
</head>
<body>
    <script>
        let users = [
            { id:1, username:"AkramShammi", password:"Akru" },
            { id:2, username:"Akhil", password:"Anmol" },
            { id:3, username:"Devanshu", password:"Devanshi" }
        ];

        let usernameInput = prompt("Enter the username:");


        let foundUser = users.find(u => u.username === usernameInput);

        if (foundUser) {
            let passwordInput = prompt("Enter the password:");

            if (foundUser.password === passwordInput) {
                console.log(" Valid User");
            } else {
                console.log("Invalid Password");
            }
        } else {
            console.log("User not found");
        }
    </script>
</body>
</html>
