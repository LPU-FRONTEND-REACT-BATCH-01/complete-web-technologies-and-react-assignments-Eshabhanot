<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            width: 300px;
            height: 200px;
            border-radius: 10px;
            padding: 20px;
        }
        .card:hover{
            letter-spacing: 1px;
            box-shadow: 0px 0px 10px rgb(45, 18, 18);
        }
        .card:hover .speaker{
            color: rgb(101, 40, 116);
        }
        p{
            text-align: center;
        }
        .quote{
            color: rgb(0, 0, 0);
            font-size: 1.2rem;
            text-align: center;
            
            
        }
        .quote::first-letter{
            font-size: 2rem;
            color: rgb(101, 40, 116);
        }
        .speaker{
            color: rgb(115, 115, 115);
            font-size: 1rem;
            font-style: italic;
            text-decoration-line: underline;
            text-decoration-color:rgb(115, 115, 115);
        }
    </style>
</head>
<body>
    <div class="card">
        <p class="quote">The only way to do great work is to love what you do.</p>
        <p class="speaker">- Steve Jobs</p>
    </div>
</body>
</html>
