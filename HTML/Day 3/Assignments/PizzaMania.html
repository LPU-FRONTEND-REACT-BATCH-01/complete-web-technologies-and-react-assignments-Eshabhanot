<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pizza Mania</title>

    <style>
      body {
        font-family: Arial;
      }

      .container {
        width: 80%;
        margin: auto;
        border: 2px solid black;
        padding: 20px;
      }

      h2 {
        border-top: 5px solid yellow;
        padding-top: 10px;
      }

      .section {
        margin-bottom: 20px;
      }

      label {
        display: inline-block;
        width: 180px;
      }

      .menu img {
        width: 50px;
        vertical-align: middle;
      }

      .highlight {
        background-color: yellow;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>🍕 Pizza Order Here</h2>

      
      <div class="section">
        <label>First Name:</label>
        <input type="text" /><br /><br />

        <label>Last Name:</label>
        <input type="text" /><br /><br />

        <label>Email:</label>
        <input type="email" /><br /><br />

        <label>Contact:</label>
        <input type="text" /><br /><br />

        <label>Preferred Date:</label>
        <input type="date" /><br /><br />

        <label>Size:</label>
        <input type="radio" name="size" /> Small
        <input type="radio" name="size" /> Medium
        <input type="radio" name="size" /> Large <br /><br />

        <label class="highlight">Outlet:</label>
        <select>
          <option>Select Outlet</option>
          <option>Hyderabad</option>
          <option>Delhi</option>
        </select>
      </div>

     
      <div class="section menu">
        <h3>Menu ↓</h3>

        <img src="../Assests/Volcano.jpg" />
        <input type="checkbox" />Volcanno Peppy Panneer (150.00 ₹)
        <select>
          <option>1</option>
          <option>2</option>
        </select>
        <br /><br />

        <img src="../Assests/ChesseBurstNonVegPizza.jpg" />
        <input type="checkbox" /> Pepperoni (140.00 ₹)
        <select>
          <option>1</option>
          <option>2</option>
        </select>
        <br /><br />

        <img src="../Assests/Farmhouse.jpg" />
        <input type="checkbox" /> Farmhouse (130.00 ₹)
        <select>
          <option>1</option>
          <option>2</option>
        </select>
      </div>

      <div class="section">
        <h3>Extra Details ↓</h3>

        <label>Credit Card:</label>
        <input type="text" placeholder="1234-5678-9123-1111" />
        <button>Verify Card</button><br /><br />

        <label>Pin:</label>
        <input type="password" /><br /><br />

        <label class="highlight">Upload photo for discount:</label>
        <input type="file" /><br /><br />

        <label class="highlight">Additional Note:</label><br />
        <textarea rows="4" cols="40"></textarea><br /><br />

        <label class="highlight">Rating:</label>
        <input type="range" /><br /><br />

        <button>Submit Order</button>
      </div>
    </div>
  </body>
</html>
