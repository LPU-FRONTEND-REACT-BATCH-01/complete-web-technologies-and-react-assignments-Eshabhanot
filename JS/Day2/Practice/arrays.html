<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrays</title>
</head>
<body>
    <script>
       
        //sorting 

        let arr=[1,23,63,25,73,5,3];
        console.log(`Original array: ${arr}`);
        arr.sort((a,b)=>a-b);  //res <0 -> a will come to left, res>0 -> b(left)
        console.log(arr);


        //filter
        let filter_arr=arr.filter(ele=> {return ele>20});
       console.log(filter_arr);

       //Internal working of filter
        let temp=[];
       for(let index=0;index<arr.length;index++){
        if(arr[index]>20){
            temp.push(arr[index]);
        }
       }
        console.log(temp);

    </script>
</body>
</html>
