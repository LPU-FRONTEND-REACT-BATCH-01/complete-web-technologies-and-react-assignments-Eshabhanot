<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops</title>
</head>
<body>
    <script>
     let num = 10;
     if(num<0){
        console.log("Number is less than 0");
     }else if(num>0){
        console.log("Number is greater than 0");
     }else{
        console.log("Number is equal to 0");
     }
    </script>
</body>
</html>
