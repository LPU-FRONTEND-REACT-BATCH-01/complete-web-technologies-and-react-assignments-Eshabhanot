<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position</title>
    <style>

        body{
            height:2000px; 
        }

        .item{
            background-color: antiquewhite;
            width: 500px;
            height: 500px;
            border: 2px solid black;
            position:relative;
            margin-top: 100px;
        }

        .item1{
            background-color:brown;
            width:50px;
            height: 50px;
            padding:20px;
            border: 4px solid crimson;
            position: relative;
            top: 2px;
            left:2px;
        }

        .item2{
            background-color:brown;
            width:50px;
            height: 50px;
            padding:20px;
            border: 4px solid crimson;
            position: absolute;
            top:4px;
            left:16px;
        }

        .item3{
            background-color:brown;
            width:50px;
            height: 50px;
            padding:20px;
            border: 4px solid crimson;
        }
        .sticky-box{
            background-color: green;
            color: white;
            padding: 15px;
            position: sticky;
            top: 0;
        }

      
        .fixed-box{
            background-color: blue;
            color: white;
            padding: 15px;
            position: fixed;
            bottom: 10px;
            right: 10px;
        }

    </style>
</head>
<body>

  
    <div class="sticky-box">I am Sticky (Scroll me!)</div>

    <div class="item">
        <div class="item1">Item 1</div>
        <div class="item2">Item 2</div>
        <div class="item3">Item 3</div>
    </div>

    <!-- Fixed Example -->
    <div class="fixed-box">I am Fixed</div>

</body>
</html>
