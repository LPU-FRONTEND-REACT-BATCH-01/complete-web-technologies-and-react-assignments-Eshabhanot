<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Item Table</title>
</head>
<body>
    <h1><i>Grocery Items</i></h1>
    <table border="1" cellpadding="10px" cellspacing="10px" style="border-collapse: collapse; border-color: black;">
         <thead>
            <tr>
                <th>SNO</th>
                <th>Item</th>
                <th>Price</th>
            </tr>
         </thead>


         <tbody>
            <tr>
                <td>1</td>
                <td>Rice</td>
                <td>100/kg</td>
            </tr>

            <tr>
                <td>2</td>
                <td>Refined Oil</td>
                <td>200</td>
            </tr>

            <tr>
              <td>3</td>
              <td>Garam Masala</td>
              <td>50</td>
            </tr>

            <tr>
                <td>4</td>
                <td> Red Chilli</td>
                <td>30</td>
            </tr>


         </tbody>

    </table>
</body>
</html>
