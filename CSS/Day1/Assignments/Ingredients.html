<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingredients</title>
    <style>
        .biryani>li{
            color: rgb(223, 79, 79);
        }
        .suger>li{
            color: rgb(223, 79, 79);
        }
        .lassai>li{
            color: rgb(90, 188, 92);
        }
        .chicken_List+li{
            color: rgb(78, 146, 240);
        }
        .suger_List>ul>li{
            color: rgb(78, 146, 240);
        }

    </style>
</head>
<body>
    <ul class = "biryani">
        <h1>Ingredients For Biryani</h1>
        <li>Rice</li>
        <li>Chicken</li>
        <div class="chicken_List">
            <ul>
                <li>Fried</li>
                <li>Grilled</li>
                <li>Roasted</li>
            </ul>
        </div>
        <li>Panner</li>
        <h1>Fighter Jet</h1>
        <li>Spices</li>
        <li>Gas/Electric</li>
    </ul>

    <ul class="lassai">
        <h1>Ingredients For Lassai</h1>
        <li>Curd</li>
        <li>Water</li>
        <li>Sugar</li>
        <div class="suger_List">
            <ul>
                <li>White Sugar</li>
                <li>Brown Sugar</li>
            </ul>
        </div>
        <li>Malai</li>  
        <li>Kova</li>
    </ul>
</body>
</html>
