<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Input</title>
</head>
<body>
    <script>
        let num = Number(prompt("Enter a number:"));
      if(num<8){
        for(let i=0;i<num;i++){
          console.log(`It is a ${num}`);
        }

      }else{
        for(let i=0;i<num*num;i++){
           console.log(`It is a ${num}`);
        }
      }
    </script>
</body>
</html>
