<body>
    <script>
        function updatePrice(price){
            if(price>6000){
                return price -price*0.25;
            }else if(price>2000){
                return price -price*0.15;
            }else{
                return "No offer";
            }
        }

       console.log(updatePrice(3000));
       console.log(updatePrice(7000));
       console.log(updatePrice(1000));

    </script>
    
</body>
